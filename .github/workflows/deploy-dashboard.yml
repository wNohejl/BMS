# Deploys the Blazor WASM dashboard to Azure Static Web Apps (free tier).
# Setup: create the Static Web App (see infra/main.bicep), then add its
# deployment token as the AZURE_STATIC_WEB_APPS_API_TOKEN repo secret.
name: Deploy dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Publish Blazor WASM
        run: dotnet publish dashboard/EdgeMonitor.Dashboard -c Release -o dashboard/publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dashboard/publish/wwwroot
          skip_app_build: true
