# Deploys the Blazor WASM dashboard to Azure Static Web Apps (free tier).
# Setup: create the Static Web App (see infra/main.bicep), then add its
# deployment token as the AZURE_STATIC_WEB_APPS_API_TOKEN repo secret.
#
# Manual-only until the SWA is provisioned — a push-triggered run without the
# token just paints a misleading red X on the Actions tab. Restore the push
# trigger (branches: [main], paths: dashboard/**) when Azure is turned on.
name: Deploy dashboard

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Publish Blazor WASM
        run: dotnet publish dashboard/EdgeMonitor.Dashboard -c Release -o dashboard/publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dashboard/publish/wwwroot
          skip_app_build: true
